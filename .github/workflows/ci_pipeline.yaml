name: Continuous Integration Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Diperbarui ke v4 untuk mengatasi warning Node.js
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Diperbarui ke v3 untuk mengatasi warning Miniconda
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12.7"

      - name: Install MLflow & DagsHub
        run: pip install mlflow==2.19.0 dagshub

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/IchiroMitsuki/Eksperimen_SML_Maulana-Ihza-Ishlahy.mlflow
          MLFLOW_TRACKING_USERNAME: IchiroMitsuki
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
        run: |
          cd MLProject
          # Diperbarui: Menghapus --no-conda agar sesuai dengan MLflow 2.19.0
          mlflow run . --env-manager local

      - name: Upload Artifact to GitHub (Skilled Requirement)
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifact
          path: MLProject/local_model/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image (Advance Requirement)
        run: |
          cd MLProject
          mlflow models build-docker -m local_model -n ichiromitsuki26/imbalance_price_model:latest
          docker push ichiromitsuki26/imbalance_price_model:latest