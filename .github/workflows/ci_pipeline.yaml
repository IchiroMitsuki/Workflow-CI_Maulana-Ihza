name: Continuous Integration Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: "3.12.7"

      - name: Install MLflow & DagsHub
        run: pip install mlflow==2.19.0 dagshub

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ github.repository_owner }}/Eksperimen_SML_Maulana-Ihza.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ github.repository_owner }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
        run: |
          cd MLProject
          mlflow run . --no-conda -env-manager local

      - name: Upload Artifact to GitHub (Skilled Requirement)
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifact
          path: MLProject/local_model/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image (Advance Requirement)
        run: |
          cd MLProject
          mlflow models build-docker -m local_model -n ichiromitsuki26/imbalance_price_model:latest
          docker push ichiromitsuki26/imbalance_price_model:latest