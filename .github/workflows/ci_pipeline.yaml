name: Continuous Integration Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Menggunakan setup-python murni untuk memaksa versi 3.12.7
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Menginstal semua library yang dibutuhkan script modelling.py
          pip install mlflow==2.19.0 dagshub pandas scikit-learn

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/IchiroMitsuki/Eksperimen_SML_Maulana-Ihza-Ishlahy.mlflow
          MLFLOW_TRACKING_USERNAME: IchiroMitsuki
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_PAT }}
        run: |
          cd MLProject
          mlflow run . --env-manager local

      - name: Upload Artifact to GitHub (Skilled Requirement)
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifact
          path: MLProject/local_model/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image (Advance Requirement)
        run: |
          cd MLProject
          mlflow models build-docker -m local_model -n ichiromitsuki26/imbalance_price_model:latest --env-manager conda
          docker push ichiromitsuki26/imbalance_price_model:latest